review:
  strategy: native

quality_gates: []

test_framework: "auto"

self_heal:
  max_retries_per_strategy: 3
  max_total_retries: 5
  escalation: "needs-human"

playwright:
  enabled: auto
  mock_backend: true
  video_dir: .mar/videos
  dev_server: ""

dev_environment:
  ports: {}
  rules: []
  start_command: ""
  stop_command: ""

branch_prefixes:
  feature: "feat/"
  fix: "fix/"
  refactor: "refactor/"

commit:
  co_author: "Co-Authored-By: Claude Code <noreply@anthropic.com>"
  prefixes:
    - "feat"
    - "fix"
    - "refactor"
    - "chore"
    - "docs"
    - "test"

shared_files: []

protected_paths: []
